<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Quantum</title>
    <style>
        /* Streamlit Birebir Taklit CSS'i */
        @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: #0e1117; /* Streamlit Koyu Arka Plan */
            color: #fafafa; /* Streamlit Beyaz Metin */
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .stApp {
            max-width: 730px; /* Streamlit Standart Genişliği */
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        h1 {
            font-weight: 700;
            font-size: 2.25rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
        }

        /* Streamlit Seçim Kutuları (Selectbox) */
        .stSelectbox { margin-bottom: 1.5rem; }
        .stSelectbox label {
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
            color: #fafafa;
        }
        .stSelectbox select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            background-color: #262730;
            color: white;
            border: 1px solid rgba(250, 250, 250, 0.2);
            border-radius: 0.5rem;
            outline: none;
            appearance: none;
            cursor: pointer;
        }
        .stSelectbox select:focus {
            border-color: #ff4b4b; /* Streamlit Pembe/Kırmızı Odaklanma */
        }

        /* Streamlit Butonları */
        .button-container {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .stButton button {
            background-color: #262730;
            color: #fafafa;
            border: 1px solid rgba(250, 250, 250, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .stButton button:hover {
            border-color: #ff4b4b;
            color: #ff4b4b;
        }

        /* Streamlit Metrik Kartları (st.metric) */
        .stMetric-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .stMetric {
            display: flex;
            flex-direction: column;
        }
        .stMetric label {
            font-size: 14px;
            color: rgba(250, 250, 250, 0.6);
        }
        .stMetric .value {
            font-size: 1.8rem;
            color: #fafafa;
            font-weight: 400;
        }
        .stMetric .delta-red { color: #ff4b4b; font-size: 14px; }
        .stMetric .delta-green { color: #09ab3b; font-size: 14px; }

        /* Streamlit Dataframe (Tablo) */
        .stDataFrame {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 14px;
        }
        .stDataFrame th, .stDataFrame td {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid rgba(250, 250, 250, 0.1);
            text-align: left;
        }
        .stDataFrame th {
            color: rgba(250, 250, 250, 0.6);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="stApp">
    <h1>Genesis Quantum: Bitcoin Risk ve İstihbarat Terminali</h1>
    <p>Makro risk unsurları ve piyasa psikolojisi simülasyonu.</p>

    <div class="stSelectbox">
        <label>Piyasa Psikolojisi (Panik Katsayısı)</label>
        <select id="panic-level">
            <option value="1.2">Düşük Duyarlılık (Normal Dönem)</option>
            <option value="2.5">Orta Şok (Destek Kırılımı)</option>
            <option value="4.8" selected>Yüksek Panik (Chain Reaction)</option>
        </select>
    </div>

    <div class="stSelectbox">
        <label>Balina Cüzdan Baskısı (Whale Volume)</label>
        <select id="whale-volume">
            <option value="500">500 BTC - Hafif Satış</option>
            <option value="2500" selected>2,500 BTC - Kurumsal Tasfiye</option>
            <option value="7500">7,500 BTC - Sistemik Çöküş</option>
        </select>
    </div>

    <div class="stSelectbox">
        <label>Emir Defteri Likidite Derinliği</label>
        <select id="liquidity-depth">
            <option value="0.9">Derin Likidite (%10 Absorbe)</option>
            <option value="0.5" selected>Sığ Likidite (%50 Kayma)</option>
            <option value="0.2">Kritik İllikit Pazar (%80 Slippage)</option>
        </select>
    </div>

    <div class="button-container">
        <div class="stButton"><button onclick="runSimulation()">Simülasyonu Çalıştır</button></div>
        <div class="stButton"><button onclick="downloadCSV()">CSV Olarak İndir</button></div>
    </div>

    <div class="stMetric-container">
        <div class="stMetric">
            <label>Net Risk Skoru</label>
            <div class="value" id="risk-score">82.4%</div>
            <div class="delta-red">Kritik Seviye</div>
        </div>
        <div class="stMetric">
            <label>Tahmini Fiyat Slippage</label>
            <div class="value" id="slippage-val">-%6.4</div>
            <div class="delta-red" id="slip-delta">Aşırı Kayma</div>
        </div>
        <div class="stMetric">
            <label>Sistemik Likidite Kaybı</label>
            <div class="value" id="liquidity-loss">-34.2M$</div>
            <div class="delta-red">Negatif Akış</div>
        </div>
    </div>

    <p style="font-weight: 600; margin-top: 2rem;">Canlı Veri Akışı</p>
    <table class="stDataFrame" id="data-table">
        <thead>
            <tr>
                <th>Adım</th>
                <th>Emir Blok Tipi</th>
                <th>Hacim</th>
                <th>Fiyat</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    let currentSimulationData = [];

    function runSimulation() {
        const panic = parseFloat(document.getElementById('panic-level').value);
        const whale = parseFloat(document.getElementById('whale-volume').value);
        const liquidity = parseFloat(document.getElementById('liquidity-depth').value);

        let basePrice = 65000;
        currentSimulationData = [];
        
        const steps = [
            { name: "Balina Tetikleme", volMult: 0.4, panicMult: 1.0 },
            { name: "Kurumsal Algoritma Tetiklenmesi", volMult: 0.6, panicMult: 1.3 },
            { name: "Kaldıraçlı İşlem Tasfiyesi", volMult: 1.1, panicMult: 1.8 },
            { name: "Bireysel Panic Selling", volMult: 1.5, panicMult: 2.5 }
        ];

        let tbody = document.querySelector('#data-table tbody');
        tbody.innerHTML = "";

        let totalSlippage = 0;
        
        steps.forEach((step, index) => {
            let calculatedVol = (whale * step.volMult).toFixed(2);
            let impactFactor = ((panic * step.panicMult) / (liquidity * 10)).toFixed(2);
            let priceDrop = calculatedVol * impactFactor * 0.05;
            basePrice = basePrice - priceDrop;
            totalSlippage += priceDrop;

            let rowData = {
                step: `T+0${index + 1} saniye`,
                name: step.name,
                volume: `${calculatedVol} BTC`,
                price: `$${basePrice.toFixed(2)}`
            };
            
            currentSimulationData.push(rowData);

            let row = `<tr>
                <td>${rowData.step}</td>
                <td>${rowData.name}</td>
                <td style="color: #ff4b4b;">${rowData.volume}</td>
                <td style="color: #09ab3b;">${rowData.price}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        let score = ((panic * 15) + (whale * 0.005) + ((1 - liquidity) * 20)).toFixed(1);
        document.getElementById('risk-score').innerText = `${Math.min(score, 100)}%`;
        document.getElementById('slippage-val').innerText = `-%${((totalSlippage / 65000) * 100).toFixed(1)}`;
        document.getElementById('liquidity-loss').innerText = `-${((whale * panic * 1.5) / 10).toFixed(1)}M $`;
    }

    function downloadCSV() {
        if(currentSimulationData.length === 0) {
            alert("Lütfen önce simülasyonu çalıştırın.");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,Adim,Emir Blok Tipi,Hacim,Anlik Fiyat\n";
        currentSimulationData.forEach(row => {
            csvContent += `"${row.step}","${row.name}","${row.volume}","${row.price}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "genesis_quantum_simulasyon.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    window.onload = runSimulation;
</script>

</body>
</html>
