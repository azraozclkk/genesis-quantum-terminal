<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Stlite App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["streamlit", "pandas", "numpy", "matplotlib"], // Uygulamanın kullandığı kütüphaneler
        entrypoint: "streamlit_app.py", // Senin Python dosyanın adı
        files: {
          "streamlit_app.py": `
import streamlit as st
# BURAYA ESKİ app.py DOSYANDAKİ KODLARIN TAMAMINI YAPIŞTIR
st.write("Terminal Başlatıldı!")
          `
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
